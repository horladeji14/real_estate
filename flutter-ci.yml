name: Flutter Mobile CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  flutter-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app_flutter

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test || true

      - name: Build release APK
        run: flutter build apk --release --dart-define=API_BASE_URL=https://api.example.com || true
