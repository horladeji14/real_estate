version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: real_estate_app
    restart: unless-stopped
    ports:
      - "8080:80"
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
      - redis

  db:
    image: mysql:8.0
    container_name: real_estate_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: real_estate
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: real_estate_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mysql_data:
