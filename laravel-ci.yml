name: Laravel CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: real_estate_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          extensions: mbstring, bcmath, pdo, pdo_mysql, intl, zip
          coverage: none

      - name: Copy env
        run: cp .env.example .env || true

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Generate app key
        run: php artisan key:generate || true

      - name: Prepare database
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: real_estate_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: |
          php artisan migrate --force || true
          php artisan db:seed --force || true

      - name: Run backend tests
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: real_estate_test
          DB_USERNAME: root
          DB_PASSWORD: root
          CACHE_DRIVER: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
        run: php artisan test --testsuite=Feature || vendor/bin/phpunit --testsuite=Feature
